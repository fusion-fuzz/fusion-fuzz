project_name: "go"

execution:
  # The driver handles finding the Go binary dynamically, but this acts as a fallback/template
  command: "go build -o /dev/null {seed_path}"
  timeout: 15
  concurrency: 8

analysis:
  crash_patterns:
    - "internal compiler error:"
    - "Please file a bug report"
    - "panic:"
    - "fatal error:"
    - "core dumped"
    - "Segmentation fault"
  syntax_patterns:
    - "syntax error"
    - "undefined:"
    - "cannot use"
    - "not enough arguments"
    - "too many arguments"
    - ": error:"

paths:
  seed_source: "projects/go/seeds"
  seed_corpus: "projects/go/corpus.db"

llm:
  provider: "openai" # Options: gemini, openai, vllm, ollama
  model: "gpt-4o"
  api_key: "" # Defaults to LLM_API_KEY env var"
  # api_base: "" # Optional, for vllm/ollama
  timeout: 30
  # rate: 0.05 # Probability to use LLM generation in fuzz loop
