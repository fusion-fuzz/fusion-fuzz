project_name: "clang"

execution:
  # The driver picks the binary (clang/clang++) and flags dynamically per
  # seed; this template is only used as a BaseDriver fallback.
  command: "clang -fsyntax-only {seed_path}"
  timeout: 10
  concurrency: 16

analysis:
  crash_patterns:
    - "SUMMARY: AddressSanitizer"
    - "SUMMARY: UndefinedBehaviorSanitizer"
    - "LLVM ERROR"
    - "Assertion `"
    - "Stack dump:"
    - "Segmentation fault"
    - "Aborted"
    - "core dumped"
    - "PLEASE submit a bug report"
  syntax_patterns:
    - "error: "
    - "fatal error: "

paths:
  seed_source: "projects/clang/llvm-project/clang/test"
  seed_corpus: "projects/clang/corpus.db"

llm:
  provider: "deepseek"  # Options: gemini, openai, vllm, ollama
  model: "deepseek-v4-flash"
  api_key: "sk-8fefc3ef0d6848858d4d5b6b5fc9ce89" # Defaults to LLM_API_KEY env var
  timeout: 30
