project_name: "mlir"

execution:
  # The driver handles the binary path dynamically, but this acts as a fallback/template
  command: "/workspace/install/bin/mlir-opt {seed_path}"
  timeout: 10
  concurrency: 16

analysis:
  crash_patterns:
    - "AddressSanitizer"
    - "UndefinedBehaviorSanitizer"
    - "Segmentation fault"
    - "LLVM ERROR"
    - "Assertion failed"
    - "UNREACHABLE executed"
    - "report_fatal_error"
    - "Aborted"
    - "internal compiler error"
    - "core dumped"
  syntax_patterns:
    - "error: unexpected error"
    - "error: expected"
    - "error: custom op"
    - "error: invalid"
    - "error: unrecognized"
    - "error: "

paths:
  # Standard location of MLIR tests in the monorepo
  seed_source: "projects/mlir/llvm-project/mlir/test"
  seed_corpus: "projects/mlir/corpus.db"

llm:
  provider: "openai" # Options: gemini, openai, vllm, ollama
  model: "gpt-4o-mini"
  # api_key: "" # Defaults to LLM_API_KEY env var
  # api_base: "" # Optional, for vllm/ollama
  timeout: 30
  # rate: 0.05 # Probability to use LLM generation in fuzz loop
