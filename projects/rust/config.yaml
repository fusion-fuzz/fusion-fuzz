project_name: "rust"

execution:
  # The driver handles the binary path dynamically, but this acts as a fallback/template
  command: "/rust-src/build/x86_64-unknown-linux-gnu/stage1/bin/rustc {seed_path} -o {output_bin}"
  timeout: 10
  concurrency: 16

analysis:
  crash_patterns:
    - "internal compiler error"
    - "thread 'rustc' panicked"
    - "stack overflow"
    - "Segmentation fault"
    - "core dumped"
    - "Aborted"
    - "LLVM ERROR"
  syntax_patterns:
    - "error["
    - "error:"
    - "panicked at "

paths:
  # Point to a directory containing valid .rs files (e.g., from rust-lang/rust/tests/ui)
  seed_source: "projects/rust/seeds"
  seed_corpus: "projects/rust/corpus.db"

llm:
  provider: "openai" # Options: gemini, openai, vllm, ollama
  model: "gpt-4o-mini"
  api_key: ""
  # api_key: "" # Defaults to LLM_API_KEY env var
  # api_base: "" # Optional, for vllm/ollama
  timeout: 30
  # rate: 0.05 # Probability to use LLM generation in fuzz loop
